<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Confirm Your New Email Address</title>
  </head>
  <body>
    <h1>Confirm your new email, {{ name }}</h1>
    <p>Use the following one-time code to confirm your new email address:</p>
    <p style="font-size: 24px; font-weight: bold">{{ otp }}</p>
    <p>
      This code will expire in 10 minutes. If you did not request this change, you can safely ignore
      this email.
    </p>
  </body>
</html>
